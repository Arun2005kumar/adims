<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log &mdash; ADIMS</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    window.ADIMS_API_BASE_URL = "http://localhost:8080/api";
    renderShell("audit-log.html", "Audit Log", "System-wide activity trail for accountability and oversight");
  </script>

  <template id="tpl-body">
    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr><th>Timestamp</th><th>User</th><th>Action</th><th>Entity</th><th>Details</th></tr>
          </thead>
          <tbody id="logsTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </template>

  <script>
    let currentPage = 0;

    (function init() {
      if (!Session.hasAnyRole("ADMIN")) {
        pageBody().innerHTML = `<div class="card"><div class="card-body"><div class="empty-state">You do not have permission to view this page.</div></div></div>`;
        return;
      }
      pageBody().innerHTML = document.getElementById("tpl-body").innerHTML;
      loadLogs();
    })();

    async function loadLogs() {
      const params = qs({ page: currentPage, size: 30 });
      try {
        const data = await api.get("/audit-logs" + params);
        renderTable(data);
        renderPagination(data);
      } catch (err) {
        showError(err);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("logsTbody");
      if (!data.content.length) {
        tbody.innerHTML = `<tr><td colspan="5"><div class="empty-state">No activity recorded yet.</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.content.map(l => `
        <tr>
          <td>${formatDateTime(l.createdAt)}</td>
          <td>${escapeHtml(l.username)}</td>
          <td>${humanize(l.action)}</td>
          <td>${l.entityType ? escapeHtml(l.entityType) + (l.entityId ? " #" + l.entityId : "") : "&mdash;"}</td>
          <td class="text-sm text-muted">${escapeHtml(l.details || "")}</td>
        </tr>
      `).join("");
    }

    function renderPagination(data) {
      document.getElementById("pagination").innerHTML = `
        <span>Page ${data.pageNumber + 1} of ${Math.max(1, data.totalPages)} &middot; ${data.totalElements} entries</span>
        <div class="controls">
          <button class="btn btn-secondary btn-sm" id="prevPage" ${data.pageNumber === 0 ? "disabled" : ""}>Previous</button>
          <button class="btn btn-secondary btn-sm" id="nextPage" ${data.last ? "disabled" : ""}>Next</button>
        </div>
      `;
      document.getElementById("prevPage").addEventListener("click", () => { currentPage--; loadLogs(); });
      document.getElementById("nextPage").addEventListener("click", () => { currentPage++; loadLogs(); });
    }
  </script>
</body>
</html>
