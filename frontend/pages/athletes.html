<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Athletes &mdash; ADIMS</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    window.ADIMS_API_BASE_URL = "http://localhost:8080/api";
    renderShell("athletes.html", "Athlete Registry", "Testing pool profiles and current risk classification");
  </script>

  <template id="tpl-body">
    <div class="page-header">
      <div class="filter-bar">
        <div class="form-group">
          <label>Search name</label>
          <input type="text" id="fSearch" placeholder="e.g. Arjun" />
        </div>
        <div class="form-group">
          <label>Sport</label>
          <input type="text" id="fSport" placeholder="e.g. Athletics" />
        </div>
        <div class="form-group">
          <label>Status</label>
          <select id="fStatus">
            <option value="">All</option>
            <option value="ACTIVE">Active</option>
            <option value="RETIRED">Retired</option>
            <option value="SUSPENDED">Suspended</option>
          </select>
        </div>
        <div class="form-group">
          <label>Risk level</label>
          <select id="fRisk">
            <option value="">All</option>
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
            <option value="CRITICAL">Critical</option>
          </select>
        </div>
        <button class="btn btn-secondary" id="btnFilter">Apply filters</button>
      </div>
      <button class="btn btn-primary" id="btnNewAthlete">+ New athlete</button>
    </div>

    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr>
              <th>Name</th><th>Sport</th><th>Testing pool</th><th>Status</th><th>Risk level</th><th>Nationality</th>
            </tr>
          </thead>
          <tbody id="athletesTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </template>

  <!-- New/Edit athlete modal -->
  <template id="tpl-modal">
    <div class="modal-overlay" id="athleteModal">
      <div class="modal">
        <div class="modal-header">
          <h3 id="modalTitle">New athlete</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <form id="athleteForm">
          <div class="modal-body">
            <input type="hidden" id="athleteId" />
            <div class="grid-2">
              <div class="form-group">
                <label>First name *</label>
                <input type="text" id="firstName" required />
              </div>
              <div class="form-group">
                <label>Last name *</label>
                <input type="text" id="lastName" required />
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Date of birth</label>
                <input type="date" id="dateOfBirth" />
              </div>
              <div class="form-group">
                <label>Gender</label>
                <select id="gender">
                  <option value="">Not specified</option>
                  <option value="MALE">Male</option>
                  <option value="FEMALE">Female</option>
                  <option value="OTHER">Other</option>
                </select>
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Sport *</label>
                <input type="text" id="sport" required />
              </div>
              <div class="form-group">
                <label>Discipline</label>
                <input type="text" id="discipline" />
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Nationality</label>
                <input type="text" id="nationality" placeholder="e.g. IN" />
              </div>
              <div class="form-group">
                <label>Testing pool *</label>
                <select id="testingPool" required>
                  <option value="NONE">None</option>
                  <option value="REGISTERED">Registered</option>
                  <option value="NATIONAL">National</option>
                </select>
              </div>
            </div>
            <div class="form-group">
              <label>Status</label>
              <select id="status">
                <option value="ACTIVE">Active</option>
                <option value="RETIRED">Retired</option>
                <option value="SUSPENDED">Suspended</option>
              </select>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary" id="saveBtn">Save athlete</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <script>
    window.ADIMS_API_BASE_URL = "http://localhost:8080/api";
    let currentPage = 0;

    (function init() {
      pageBody().innerHTML = document.getElementById("tpl-body").innerHTML;
      document.body.insertAdjacentHTML("beforeend", document.getElementById("tpl-modal").innerHTML);

      const canEdit = Session.hasAnyRole("ADMIN", "INVESTIGATOR");
      if (!canEdit) document.getElementById("btnNewAthlete").classList.add("hidden");

      document.getElementById("btnFilter").addEventListener("click", () => { currentPage = 0; loadAthletes(); });
      document.getElementById("btnNewAthlete").addEventListener("click", () => openModal());
      document.getElementById("modalClose").addEventListener("click", closeModal);
      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      document.getElementById("athleteForm").addEventListener("submit", saveAthlete);

      loadAthletes();
    })();

    async function loadAthletes() {
      const params = qs({
        query: document.getElementById("fSearch").value,
        sport: document.getElementById("fSport").value,
        status: document.getElementById("fStatus").value,
        riskLevel: document.getElementById("fRisk").value,
        page: currentPage,
        size: 15
      });
      try {
        const data = await api.get("/athletes" + params);
        renderTable(data);
        renderPagination(data);
      } catch (err) {
        showError(err);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("athletesTbody");
      if (!data.content.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No athletes match these filters.</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.content.map(a => `
        <tr class="clickable-row" onclick="window.location.href='athlete-detail.html?id=${a.id}'">
          <td><strong>${escapeHtml(a.firstName)} ${escapeHtml(a.lastName)}</strong></td>
          <td>${escapeHtml(a.sport)}${a.discipline ? " &middot; " + escapeHtml(a.discipline) : ""}</td>
          <td>${badge(a.testingPool)}</td>
          <td>${badge(a.status)}</td>
          <td>${badge(a.riskLevel)}</td>
          <td>${escapeHtml(a.nationality || "\u2014")}</td>
        </tr>
      `).join("");
    }

    function renderPagination(data) {
      document.getElementById("pagination").innerHTML = `
        <span>Page ${data.pageNumber + 1} of ${Math.max(1, data.totalPages)} &middot; ${data.totalElements} athletes</span>
        <div class="controls">
          <button class="btn btn-secondary btn-sm" id="prevPage" ${data.pageNumber === 0 ? "disabled" : ""}>Previous</button>
          <button class="btn btn-secondary btn-sm" id="nextPage" ${data.last ? "disabled" : ""}>Next</button>
        </div>
      `;
      document.getElementById("prevPage").addEventListener("click", () => { currentPage--; loadAthletes(); });
      document.getElementById("nextPage").addEventListener("click", () => { currentPage++; loadAthletes(); });
    }

    function openModal(athlete) {
      document.getElementById("modalTitle").textContent = athlete ? "Edit athlete" : "New athlete";
      document.getElementById("athleteId").value = athlete ? athlete.id : "";
      document.getElementById("firstName").value = athlete ? athlete.firstName : "";
      document.getElementById("lastName").value = athlete ? athlete.lastName : "";
      document.getElementById("dateOfBirth").value = athlete ? (athlete.dateOfBirth || "") : "";
      document.getElementById("gender").value = athlete ? (athlete.gender || "") : "";
      document.getElementById("sport").value = athlete ? athlete.sport : "";
      document.getElementById("discipline").value = athlete ? (athlete.discipline || "") : "";
      document.getElementById("nationality").value = athlete ? (athlete.nationality || "") : "";
      document.getElementById("testingPool").value = athlete ? athlete.testingPool : "NONE";
      document.getElementById("status").value = athlete ? athlete.status : "ACTIVE";
      document.getElementById("athleteModal").classList.remove("hidden");
    }

    function closeModal() {
      document.getElementById("athleteModal").classList.add("hidden");
    }

    async function saveAthlete(e) {
      e.preventDefault();
      const id = document.getElementById("athleteId").value;
      const payload = {
        firstName: document.getElementById("firstName").value,
        lastName: document.getElementById("lastName").value,
        dateOfBirth: document.getElementById("dateOfBirth").value || null,
        gender: document.getElementById("gender").value || null,
        sport: document.getElementById("sport").value,
        discipline: document.getElementById("discipline").value || null,
        nationality: document.getElementById("nationality").value || null,
        testingPool: document.getElementById("testingPool").value,
        status: document.getElementById("status").value
      };
      try {
        if (id) {
          await api.put(`/athletes/${id}`, payload);
          showToast("Athlete profile updated", "success");
        } else {
          await api.post("/athletes", payload);
          showToast("Athlete profile created", "success");
        }
        closeModal();
        loadAthletes();
      } catch (err) {
        showError(err);
      }
    }
  </script>
</body>
</html>
