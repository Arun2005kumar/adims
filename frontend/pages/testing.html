<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testing Records &mdash; ADIMS</title>
  <link rel="stylesheet" href="../css/styles.css" />
</head>
<body>
  <script src="../js/api.js"></script>
  <script src="../js/nav.js"></script>
  <script>
    window.ADIMS_API_BASE_URL = "http://localhost:8080/api";
    renderShell("testing.html", "Testing Records", "In- and out-of-competition sample collection results");
  </script>

  <template id="tpl-body">
    <div class="page-header">
      <div></div>
      <button class="btn btn-primary" id="btnNewRecord">+ Log testing record</button>
    </div>

    <div class="card">
      <div class="table-scroll">
        <table>
          <thead>
            <tr><th>Date</th><th>Athlete</th><th>Type</th><th>Result</th><th>Sample ID</th><th>Lab</th></tr>
          </thead>
          <tbody id="recordsTbody"></tbody>
        </table>
      </div>
      <div class="pagination" id="pagination"></div>
    </div>
  </template>

  <!-- New record modal -->
  <template id="tpl-modal">
    <div class="modal-overlay" id="recordModal">
      <div class="modal">
        <div class="modal-header">
          <h3>Log testing record</h3>
          <button class="modal-close" id="modalClose">&times;</button>
        </div>
        <form id="recordForm">
          <div class="modal-body">
            <div class="grid-2">
              <div class="form-group">
                <label>Athlete ID *</label>
                <input type="number" id="athleteId" required placeholder="e.g. 1" />
              </div>
              <div class="form-group">
                <label>Test date *</label>
                <input type="date" id="testDate" required />
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Test type *</label>
                <select id="testType" required>
                  <option value="OUT_OF_COMPETITION">Out of competition</option>
                  <option value="IN_COMPETITION">In competition</option>
                </select>
              </div>
              <div class="form-group">
                <label>Result</label>
                <select id="result">
                  <option value="PENDING">Pending</option>
                  <option value="NEGATIVE">Negative</option>
                  <option value="POSITIVE">Positive</option>
                  <option value="ATYPICAL">Atypical</option>
                </select>
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group">
                <label>Sample ID</label>
                <input type="text" id="sampleId" />
              </div>
              <div class="form-group">
                <label>Laboratory</label>
                <input type="text" id="labName" placeholder="e.g. NDTL New Delhi" />
              </div>
            </div>
            <div class="form-group">
              <label>Notes</label>
              <textarea id="notes" rows="3"></textarea>
            </div>
          </div>
          <div class="modal-footer">
            <button type="button" class="btn btn-secondary" id="cancelBtn">Cancel</button>
            <button type="submit" class="btn btn-primary">Save record</button>
          </div>
        </form>
      </div>
    </div>
  </template>

  <script>
    let currentPage = 0;

    (function init() {
      pageBody().innerHTML = document.getElementById("tpl-body").innerHTML;
      document.body.insertAdjacentHTML("beforeend", document.getElementById("tpl-modal").innerHTML);

      const canCreate = Session.hasAnyRole("ADMIN", "INVESTIGATOR", "ANALYST");
      if (!canCreate) document.getElementById("btnNewRecord").classList.add("hidden");

      document.getElementById("btnNewRecord").addEventListener("click", () => document.getElementById("recordModal").classList.remove("hidden"));
      document.getElementById("modalClose").addEventListener("click", closeModal);
      document.getElementById("cancelBtn").addEventListener("click", closeModal);
      document.getElementById("recordForm").addEventListener("submit", saveRecord);

      loadRecords();
    })();

    function closeModal() {
      document.getElementById("recordModal").classList.add("hidden");
      document.getElementById("recordForm").reset();
    }

    async function loadRecords() {
      const params = qs({ page: currentPage, size: 15 });
      try {
        const data = await api.get("/testing-records" + params);
        renderTable(data);
        renderPagination(data);
      } catch (err) {
        showError(err);
      }
    }

    function renderTable(data) {
      const tbody = document.getElementById("recordsTbody");
      if (!data.content.length) {
        tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state">No testing records logged yet.</div></td></tr>`;
        return;
      }
      tbody.innerHTML = data.content.map(r => `
        <tr>
          <td>${formatDate(r.testDate)}</td>
          <td><a href="athlete-detail.html?id=${r.athleteId}">${escapeHtml(r.athleteName)}</a></td>
          <td>${humanize(r.testType)}</td>
          <td>${badge(r.result)}</td>
          <td>${escapeHtml(r.sampleId || "\u2014")}</td>
          <td>${escapeHtml(r.labName || "\u2014")}</td>
        </tr>
      `).join("");
    }

    function renderPagination(data) {
      document.getElementById("pagination").innerHTML = `
        <span>Page ${data.pageNumber + 1} of ${Math.max(1, data.totalPages)} &middot; ${data.totalElements} records</span>
        <div class="controls">
          <button class="btn btn-secondary btn-sm" id="prevPage" ${data.pageNumber === 0 ? "disabled" : ""}>Previous</button>
          <button class="btn btn-secondary btn-sm" id="nextPage" ${data.last ? "disabled" : ""}>Next</button>
        </div>
      `;
      document.getElementById("prevPage").addEventListener("click", () => { currentPage--; loadRecords(); });
      document.getElementById("nextPage").addEventListener("click", () => { currentPage++; loadRecords(); });
    }

    async function saveRecord(e) {
      e.preventDefault();
      const payload = {
        athleteId: Number(document.getElementById("athleteId").value),
        testDate: document.getElementById("testDate").value,
        testType: document.getElementById("testType").value,
        result: document.getElementById("result").value,
        sampleId: document.getElementById("sampleId").value || null,
        labName: document.getElementById("labName").value || null,
        notes: document.getElementById("notes").value || null
      };
      try {
        await api.post("/testing-records", payload);
        showToast("Testing record logged", "success");
        closeModal();
        loadRecords();
      } catch (err) {
        showError(err);
      }
    }
  </script>
</body>
</html>
