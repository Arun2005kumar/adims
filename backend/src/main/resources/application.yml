server:
  port: 8080
  error:
    include-message: always
    include-binding-errors: always

spring:
  application:
    name: anti-doping-intelligence-system

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:antidoping_investigation}
    username: ${DB_USERNAME:adims_user}
    password: ${DB_PASSWORD:adims_pass}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
    open-in-view: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:c2VjcmV0LWtleS1mb3ItYW50aS1kb3BpbmctaW50ZWxsaWdlbmNlLXN5c3RlbS1jaGFuZ2UtdGhpcy1pbi1wcm9kdWN0aW9uLTEyMzQ1Njc4OTA=}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5500,http://127.0.0.1:5500,http://localhost:3000,http://localhost:8081}

logging:
  level:
    root: INFO
    com.antidoping.intelligence: DEBUG
    org.springframework.security: INFO
