services:
  postgres:
    image: postgres:16-alpine
    container_name: adims_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: antidoping_investigation
      POSTGRES_USER: adims_user
      POSTGRES_PASSWORD: adims_pass
    ports:
      - "5432:5432"
    volumes:
      - adims_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U adims_user -d antidoping_investigation"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  adims_pgdata:
